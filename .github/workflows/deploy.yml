name: CI/CD Pipeline - AWS EC2 Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.7'

    - name: Build with Gradle
      working-directory: backend
      run: gradle build

    - name: Set up Docker Buildx
      if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ env.DOCKERHUB_USERNAME }}
        password: ${{ env.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: ${{ env.DOCKERHUB_USERNAME }}/batch-monitor-app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

    steps:
    - name: Skip deploy when secrets are not configured
      if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' || env.EC2_HOST == '' || env.EC2_USERNAME == '' || env.EC2_SSH_KEY == '' }}
      run: echo "Deployment secrets are not configured; skipping deploy."

    - name: Deploy to AWS EC2 via SSH
      if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.EC2_HOST != '' && env.EC2_USERNAME != '' && env.EC2_SSH_KEY != '' }}
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ env.EC2_HOST }}
        username: ${{ env.EC2_USERNAME }}
        key: ${{ env.EC2_SSH_KEY }}
        script: |
          # 배포 디렉토리로 이동
          cd ~/app
          
          # Docker Hub 로그인 및 최신 이미지 Pull
          docker login -u "${{ env.DOCKERHUB_USERNAME }}" -p "${{ env.DOCKERHUB_TOKEN }}"
          docker-compose pull app
          
          # 컨테이너 서비스 재시동 (무중단 롤링 배포 구조는 단일 인스턴스인 관계로 다운타임 최소화 재기동 설정)
          docker-compose up -d --remove-orphans postgres app
          
          # 사용하지 않는 Docker 리소스 정리
          docker image prune -f
