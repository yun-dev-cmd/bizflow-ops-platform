version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bizflow-postgres
    environment:
      POSTGRES_DB: batchdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  app:
    build: ./backend
    container_name: bizflow-ops-app
    ports:
      - "8080:8080"
    environment:
      RDS_HOSTNAME: postgres
      RDS_PORT: 5432
      RDS_DB_NAME: batchdb
      RDS_USERNAME: postgres
      RDS_PASSWORD: password
      JWT_SECRET_KEY: dGhpcy1pcy1hLXNhbXBsZS1zZWNyZXQta2V5LWZvci1qd3Qtc2hhMjU2LWFsaWduZWQtc2VjdXJpdHktcHJpdmFjeQ==
      AWS_S3_BUCKET: bizflow-integration-bucket
      AWS_ACCESS_KEY: temp
      AWS_SECRET_KEY: temp
    depends_on:
      - postgres
    restart: always

volumes:
  pgdata:
