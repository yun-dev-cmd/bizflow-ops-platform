version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bizflow-postgres
    environment:
      POSTGRES_DB: batchdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d batchdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  app:
    build: ./backend
    container_name: bizflow-ops-app
    ports:
      - "8080:8080"
    environment:
      RDS_HOSTNAME: postgres
      RDS_PORT: 5432
      RDS_DB_NAME: batchdb
      RDS_USERNAME: postgres
      RDS_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET_KEY: dGhpcy1pcy1hLXNhbXBsZS1zZWNyZXQta2V5LWZvci1qd3Qtc2hhMjU2LWFsaWduZWQtc2VjdXJpdHktcHJpdmFjeQ==
      AWS_S3_BUCKET: bizflow-integration-bucket
      AWS_ACCESS_KEY: aws_access_key_placeholder
      AWS_SECRET_KEY: aws_secret_key_placeholder
      AWS_S3_LOCAL_ONLY: true
      APP_SEED_DEMO_SCENARIOS: false
    depends_on:
      postgres:
        condition: service_healthy
    restart: always

volumes:
  pgdata:
